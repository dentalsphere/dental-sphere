<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | Dental Sphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 3rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-medium);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card img {
            height: 60px;
            margin: 0 auto 1rem auto;
        }
        .login-card h2 {
            margin-bottom: 2rem;
            color: var(--secondary);
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 1rem;
        }
        .btn-login:hover {
            background: var(--primary-hover);
        }
        #error-msg {
            color: var(--primary);
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="dental sphere logo .jpeg" alt="Dental Sphere Logo">
        <h2>Staff Portal</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-login">Login to Dashboard</button>
            <div id="error-msg">Invalid credentials. Try admin/admin.</div>
        </form>
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Website</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            // Simple credential check (In a real app, this should be done via backend)
            if((user === 'admin' && pass === 'admin') || (user === 'drkaushik' && pass === 'sphere123')) {
                sessionStorage.setItem('isStaff', 'true');
                window.location.href = 'admin-dashboard.html';
            } else {
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
